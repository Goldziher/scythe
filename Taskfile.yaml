version: "3"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  setup:
    desc: "Install all dependencies and initialize project. Idempotent."
    cmds:
      - cargo fetch
      - prek install
      - prek install --hook-type commit-msg
      - echo "Setup complete"

  build:
    desc: Build release binary
    cmds:
      - cargo build --workspace --release

  test:
    desc: Run all tests
    cmds:
      - cargo test --workspace

  test:verbose:
    desc: Run tests with verbose output
    cmds:
      - cargo test --workspace -- --nocapture

  lint:
    desc: Run all linters and formatters via prek
    cmds:
      - prek run --all-files

  format:
    desc: Format all code
    cmds:
      - cargo fmt --all

  check:
    desc: Run all checks (lint + test)
    cmds:
      - task: lint
      - task: test

  snippets:build:
    desc: Build the snippet-runner tool
    cmds:
      - cargo build -p snippet-runner --release

  snippets:list:
    desc: List all documentation snippets
    deps: [snippets:build]
    cmds:
      - ./target/release/snippet-runner list -s docs/snippets -r docs/docs

  snippets:validate:
    desc: Validate documentation snippets (syntax level)
    deps: [snippets:build]
    cmds:
      - ./target/release/snippet-runner validate -s docs/snippets -r docs/docs -L syntax

  snippets:validate:compile:
    desc: Validate documentation snippets (compile level)
    deps: [snippets:build]
    cmds:
      - ./target/release/snippet-runner validate -s docs/snippets -r docs/docs -L compile

  snippets:validate:lang:
    desc: Validate specific language snippets
    deps: [snippets:build]
    cmds:
      - ./target/release/snippet-runner validate -s docs/snippets -r docs/docs -L {{.LEVEL | default "syntax"}} -l {{.LANGUAGES}}
    requires:
      vars: [LANGUAGES]

  clean:
    desc: Clean build artifacts
    cmds:
      - cargo clean

  update:
    desc: Update dependencies
    cmds:
      - cargo upgrade --incompatible
      - cargo update
      - prek autoupdate
