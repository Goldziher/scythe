version: "3"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  setup:
    desc: "Install all dependencies and initialize project. Idempotent."
    cmds:
      - cargo fetch
      - poly hooks install
      - echo "Setup complete"

  build:
    desc: Build release binary
    cmds:
      - cargo build --workspace --release

  test:
    desc: Run all tests
    cmds:
      - cargo test --workspace

  test:verbose:
    desc: Run tests with verbose output
    cmds:
      - cargo test --workspace -- --nocapture

  lint:
    desc: Run all linters via poly
    cmds:
      - poly lint .

  format:
    desc: Format all code via poly
    cmds:
      - poly fmt --fix .

  check:
    desc: Run all checks (lint + test)
    cmds:
      - task: lint
      - task: test

  snippets:build:
    desc: Build the snippet-runner tool
    cmds:
      - cargo build -p snippet-runner --release

  snippets:list:
    desc: List all documentation snippets
    deps: [snippets:build]
    cmds:
      - ./target/release/snippet-runner list -s docs/snippets -r docs

  snippets:validate:
    desc: Validate documentation snippets (syntax level)
    deps: [snippets:build]
    cmds:
      - ./target/release/snippet-runner validate -s docs/snippets -r docs -L syntax

  snippets:validate:compile:
    desc: Validate documentation snippets (compile level)
    deps: [snippets:build]
    cmds:
      - ./target/release/snippet-runner validate -s docs/snippets -r docs -L compile

  snippets:validate:lang:
    desc: Validate specific language snippets
    deps: [snippets:build]
    cmds:
      - ./target/release/snippet-runner validate -s docs/snippets -r docs -L {{.LEVEL | default "syntax"}} -l {{.LANGUAGES}}
    requires:
      vars: [LANGUAGES]

  clean:
    desc: Clean build artifacts
    cmds:
      - cargo clean

  version:sync:
    desc: "Update all package versions to the given VERSION"
    requires:
      vars: [VERSION]
    cmds:
      - sed -i '' 's/^version = ".*"/version = "{{.VERSION}}"/' crates/scythe-cli/Cargo.toml crates/scythe-core/Cargo.toml crates/scythe-codegen/Cargo.toml crates/scythe-backend/Cargo.toml crates/scythe-lint/Cargo.toml
      - sed -i '' -E 's/(scythe-(core|codegen|backend|lint|cli).*version = ")[^"]*"/\1{{.VERSION}}"/' crates/scythe-cli/Cargo.toml crates/scythe-codegen/Cargo.toml crates/scythe-lint/Cargo.toml
      - cargo check --workspace 2>/dev/null || true
      - echo "All crate versions updated to {{.VERSION}}"

  update:
    desc: Update dependencies (workspace + dev tooling + integration tests)
    cmds:
      - cargo upgrade --incompatible
      - cargo update
      - uv lock --upgrade
      - task: update:integration

  update:integration:
    desc: Update lock files in all integration test projects
    cmds:
      - for f in integration_tests/*/Cargo.lock; do (cd "${f%/*}" && cargo update); done
      - for f in integration_tests/*/uv.lock; do (cd "${f%/*}" && uv lock --upgrade); done
      - for f in integration_tests/*/pnpm-lock.yaml; do (cd "${f%/*}" && pnpm update --lockfile-only); done
      - for f in integration_tests/*/go.sum; do (cd "${f%/*}" && go get -u ./... && go mod tidy); done
      - for f in integration_tests/*/Gemfile.lock; do (cd "${f%/*}" && bundle lock --update); done
      - for f in integration_tests/*/mix.lock; do (cd "${f%/*}" && mix deps.update --all); done
      - for f in integration_tests/*/composer.lock; do (cd "${f%/*}" && composer update --no-install); done
