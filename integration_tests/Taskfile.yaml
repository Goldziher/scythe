version: "3"

vars:
  DATABASE_URL: "postgres://scythe:scythe@localhost:5433/scythe_test"
  MYSQL_URL: "mysql://scythe:scythe@127.0.0.1:3307/scythe_test"
  MARIADB_URL: "mysql://scythe:scythe@127.0.0.1:3308/scythe_test"
  ORACLE_URL: "oracle://scythe:scythe@localhost:1521/XEPDB1"
  SQLITE_PATH: "/tmp/scythe_test.db"

env:
  DATABASE_URL: "{{.DATABASE_URL}}"
  MYSQL_URL: "{{.MYSQL_URL}}"
  MARIADB_URL: "{{.MARIADB_URL}}"
  ORACLE_URL: "{{.ORACLE_URL}}"
  SQLITE_PATH: "{{.SQLITE_PATH}}"
  DATABASE_PATH: "{{.SQLITE_PATH}}"

tasks:
  db:up:
    desc: Start database containers
    dir: "{{.ROOT_DIR}}"
    cmds:
      - docker compose up -d --wait

  db:down:
    desc: Stop database containers
    dir: "{{.ROOT_DIR}}"
    cmds:
      - docker compose down -v

  db:migrate:
    desc: Run PG schema migration
    cmds:
      - PGPASSWORD=scythe psql -h localhost -p 5433 -U scythe -d scythe_test -f sql/pg/schema.sql

  db:migrate:mysql:
    desc: Run MySQL schema migration
    cmds:
      - mysql -h 127.0.0.1 -P 3307 -u scythe -pscythe scythe_test < sql/mysql/schema.sql

  db:migrate:mariadb:
    desc: Run MariaDB schema migration
    cmds:
      - mysql -h 127.0.0.1 -P 3308 -u scythe -pscythe scythe_test < sql/mariadb/schema.sql

  db:reset:
    desc: Drop and recreate all tables
    cmds:
      - PGPASSWORD=scythe psql -h localhost -p 5433 -U scythe -d scythe_test -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public;"
      - task: db:migrate

  generate:
    desc: Regenerate code for all backends
    cmds:
      - for:
          # PostgreSQL
          - rust-sqlx
          - rust-tokio-postgres
          - python-psycopg3
          - python-asyncpg
          - python-psycopg3-pydantic
          - python-psycopg3-msgspec
          - go-pgx
          - typescript-postgres
          - typescript-pg
          - typescript-pg-zod
          - java-jdbc
          - kotlin-jdbc
          - csharp-npgsql
          - elixir-postgrex
          - elixir-ecto
          - ruby-pg
          - php-pdo
          - php-amphp
          # MySQL
          - rust-sqlx-mysql
          - go-database-sql-mysql
          - python-aiomysql
          - typescript-mysql2
          - java-jdbc-mysql
          - kotlin-jdbc-mysql
          - csharp-mysqlconnector
          - elixir-myxql
          - ruby-mysql2
          - ruby-trilogy
          - php-pdo-mysql
          # MariaDB
          - rust-sqlx-mariadb
          - go-database-sql-mariadb
          - python-aiomysql-mariadb
          - typescript-mysql2-mariadb
          - java-jdbc-mariadb
          - kotlin-jdbc-mariadb
          - csharp-mysqlconnector-mariadb
          - elixir-myxql-mariadb
          - ruby-mysql2-mariadb
          - ruby-trilogy-mariadb
          - php-pdo-mariadb
          # Oracle
          - python-oracledb-oracle
          - typescript-oracledb-oracle
          - go-godror-oracle
          - java-jdbc-oracle
          - kotlin-jdbc-oracle
          - csharp-oracle
          - elixir-jamdb-oracle
          - ruby-oci8-oracle
          - rust-sibyl-oracle
          # SQLite
          - rust-sqlx-sqlite
          - go-database-sql-sqlite
          - python-aiosqlite
          - typescript-better-sqlite3
          - java-jdbc-sqlite
          - kotlin-jdbc-sqlite
          - csharp-microsoft-sqlite
          - elixir-exqlite
          - ruby-sqlite3
          - php-pdo-sqlite
        cmd: cd {{.ITEM}} && scythe generate

  # --- PostgreSQL backends ---
  test:rust-sqlx:
    desc: Run rust-sqlx integration test
    dir: rust-sqlx
    cmds:
      - cargo run --quiet

  test:rust-tokio-postgres:
    desc: Run rust-tokio-postgres integration test
    dir: rust-tokio-postgres
    cmds:
      - cargo run --quiet

  test:python-psycopg3:
    desc: Run python-psycopg3 integration test
    dir: python-psycopg3
    cmds:
      - uv run python test_integration.py

  test:python-asyncpg:
    desc: Run python-asyncpg integration test
    dir: python-asyncpg
    cmds:
      - uv run python test_integration.py

  test:python-psycopg3-pydantic:
    desc: Run python-psycopg3-pydantic integration test
    dir: python-psycopg3-pydantic
    cmds:
      - uv run python test_integration.py

  test:python-psycopg3-msgspec:
    desc: Run python-psycopg3-msgspec integration test
    dir: python-psycopg3-msgspec
    cmds:
      - uv run python test_integration.py

  test:go-pgx:
    desc: Run go-pgx integration test
    dir: go-pgx
    cmds:
      - go run .

  test:typescript-postgres:
    desc: Run typescript-postgres integration test
    dir: typescript-postgres
    cmds:
      - pnpm install --frozen-lockfile 2>/dev/null || pnpm install
      - pnpm exec tsx test.ts

  test:typescript-pg:
    desc: Run typescript-pg integration test
    dir: typescript-pg
    cmds:
