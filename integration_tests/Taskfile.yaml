    dir: typescript-pg-zod
    cmds:
      - pnpm install --frozen-lockfile 2>/dev/null || pnpm install
      - pnpm exec tsx test.ts

  test:java-jdbc:
    desc: Run java-jdbc integration test
    dir: java-jdbc
    cmds:
      - mvn -q compile exec:java

  test:kotlin-jdbc:
    desc: Run kotlin-jdbc integration test
    dir: kotlin-jdbc
    cmds:
      - gradle run --quiet

  test:csharp-npgsql:
    desc: Run csharp-npgsql integration test
    dir: csharp-npgsql
    cmds:
