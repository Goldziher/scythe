services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scythe
      POSTGRES_PASSWORD: scythe
      POSTGRES_DB: scythe_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scythe"]
      interval: 2s
      timeout: 5s
      retries: 10

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: scythe
      MYSQL_DATABASE: scythe_test
      MYSQL_USER: scythe
      MYSQL_PASSWORD: scythe
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 2s
      timeout: 5s
      retries: 10

  oracle:
    image: gvenzl/oracle-xe:21-slim
    environment:
      ORACLE_PASSWORD: scythe
      APP_USER: scythe
      APP_USER_PASSWORD: scythe
    ports:
      - "1521:1521"
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 20

  mariadb:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: scythe
      MARIADB_DATABASE: scythe_test
      MARIADB_USER: scythe
      MARIADB_PASSWORD: scythe
    ports:
      - "3308:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 2s
      timeout: 5s
      retries: 10
