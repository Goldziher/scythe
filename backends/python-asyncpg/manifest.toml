[backend]
name = "python-asyncpg"
language = "python"
file_extension = "py"
engine = "postgresql"
description = "Python code generation targeting asyncpg"

[types.scalars]
bool = "bool"
int16 = "int"
int32 = "int"
int64 = "int"
float32 = "float"
float64 = "float"
string = "str"
bytes = "bytes"
uuid = "uuid.UUID"
decimal = "decimal.Decimal"
date = "datetime.date"
time = "datetime.time"
time_tz = "datetime.time"
datetime = "datetime.datetime"
datetime_tz = "datetime.datetime"
interval = "datetime.timedelta"
json = "dict[str, Any]"
inet = "str"

[types.containers]
array = "list[{T}]"
nullable = "{T} | None"
range = "tuple[{T}, {T}]"
json_typed = "{T}"

[naming]
struct_case = "PascalCase"
field_case = "snake_case"
fn_case = "snake_case"
enum_variant_case = "SCREAMING_SNAKE_CASE"
row_suffix = "Row"

[imports.rules]
"uuid." = "import uuid"
"datetime." = "import datetime"
"decimal." = "import decimal"
"dict[" = "from typing import Any"
