[backend]
name = "typescript-better-sqlite3"
language = "typescript"
file_extension = "ts"
engine = "sqlite"
description = "TypeScript code generation targeting better-sqlite3 (synchronous)"

[types.scalars]
bool = "number"
int16 = "number"
int32 = "number"
int64 = "number"
float32 = "number"
float64 = "number"
string = "string"
bytes = "Buffer"
uuid = "string"
decimal = "number"
date = "string"
time = "string"
time_tz = "string"
datetime = "string"
datetime_tz = "string"
interval = "string"
json = "Record<string, unknown>"
inet = "string"

[types.containers]
array = "{T}[]"
nullable = "{T} | null"
range = "string"
json_typed = "{T}"

[naming]
struct_case = "PascalCase"
field_case = "camelCase"
fn_case = "camelCase"
enum_variant_case = "PascalCase"
row_suffix = "Row"

[imports.rules]
