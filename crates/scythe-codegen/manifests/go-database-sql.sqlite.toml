[backend]
name = "go-database-sql"
language = "go"
file_extension = "go"
engine = "sqlite"
description = "Go code generation targeting database/sql with SQLite"

[types.scalars]
bool = "bool"
int16 = "int16"
int32 = "int32"
int64 = "int64"
float32 = "float32"
float64 = "float64"
string = "string"
bytes = "[]byte"
uuid = "string"
decimal = "float64"
date = "string"
time = "string"
time_tz = "string"
datetime = "string"
datetime_tz = "string"
interval = "string"
json = "string"
inet = "string"

[types.containers]
array = "[]{T}"
nullable = "*{T}"
range = "string"
json_typed = "{T}"

[naming]
struct_case = "PascalCase"
field_case = "PascalCase"
fn_case = "PascalCase"
enum_variant_case = "PascalCase"
row_suffix = "Row"

[imports.rules]
