[backend]
name = "typescript-duckdb"
language = "typescript"
file_extension = "ts"
engine = "duckdb"
description = "TypeScript code generation targeting @duckdb/node-api"

[types.scalars]
bool = "boolean"
int16 = "number"
int32 = "number"
int64 = "bigint"
float32 = "number"
float64 = "number"
string = "string"
bytes = "Uint8Array"
uuid = "string"
decimal = "number"
date = "string"
time = "string"
time_tz = "string"
datetime = "string"
datetime_tz = "string"
interval = "string"
json = "Record<string, unknown>"
inet = "string"

[types.containers]
array = "{T}[]"
nullable = "{T} | null"
range = "string"
json_typed = "{T}"

[naming]
struct_case = "PascalCase"
field_case = "camelCase"
fn_case = "camelCase"
enum_variant_case = "PascalCase"
row_suffix = "Row"

[imports.rules]
