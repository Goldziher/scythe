[backend]
name = "ruby-sqlite3"
language = "ruby"
file_extension = "rb"
engine = "sqlite"
description = "Ruby code generation targeting sqlite3 gem"

[types.scalars]
bool = "Boolean"
int16 = "Integer"
int32 = "Integer"
int64 = "Integer"
float32 = "Float"
float64 = "Float"
string = "String"
bytes = "String"
uuid = "String"
decimal = "Float"
date = "String"
time = "String"
time_tz = "String"
datetime = "String"
datetime_tz = "String"
interval = "String"
json = "String"
inet = "String"

[types.containers]
array = "Array<{T}>"
nullable = "{T}"
range = "String"
json_typed = "{T}"

[naming]
struct_case = "PascalCase"
field_case = "snake_case"
fn_case = "snake_case"
enum_variant_case = "SCREAMING_SNAKE_CASE"
row_suffix = "Row"

[imports.rules]
