[backend]
name = "php-pdo"
language = "php"
file_extension = "php"
engine = "sqlite"
description = "PHP code generation targeting PDO with SQLite"

[types.scalars]
bool = "bool"
int16 = "int"
int32 = "int"
int64 = "int"
float32 = "float"
float64 = "float"
string = "string"
bytes = "string"
uuid = "string"
decimal = "float"
date = "string"
time = "string"
time_tz = "string"
datetime = "string"
datetime_tz = "string"
interval = "string"
json = "string"
inet = "string"

[types.containers]
array = "array<{T}>"
nullable = "?{T}"
json_typed = "{T}"

[naming]
struct_case = "PascalCase"
field_case = "camelCase"
fn_case = "camelCase"
enum_variant_case = "SCREAMING_SNAKE_CASE"
row_suffix = "Row"

[imports.rules]
