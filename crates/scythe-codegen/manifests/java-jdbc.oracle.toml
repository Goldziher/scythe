[backend]
name = "java-jdbc"
language = "java"
file_extension = "java"
engine = "oracle"
description = "Java code generation targeting JDBC with Oracle (ojdbc11)"

[types.scalars]
bool = "boolean"
int16 = "short"
int32 = "int"
int64 = "long"
float32 = "float"
float64 = "double"
string = "String"
bytes = "byte[]"
uuid = "String"
decimal = "java.math.BigDecimal"
date = "java.time.LocalDateTime"
time = "java.time.LocalTime"
time_tz = "java.time.OffsetTime"
datetime = "java.time.LocalDateTime"
datetime_tz = "java.time.OffsetDateTime"
interval = "String"
json = "String"
inet = "String"

[types.containers]
array = "java.util.List<{T}>"
nullable = "@Nullable {T}"
range = "String"
json_typed = "{T}"

[naming]
struct_case = "PascalCase"
field_case = "camelCase"
fn_case = "camelCase"
enum_variant_case = "SCREAMING_SNAKE_CASE"
row_suffix = "Row"

[imports.rules]
