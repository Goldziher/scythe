[backend]
name = "csharp-microsoft-sqlite"
language = "csharp"
file_extension = "cs"
engine = "sqlite"
description = "C# code generation targeting Microsoft.Data.Sqlite with SQLite"

[types.scalars]
bool = "bool"
int16 = "short"
int32 = "int"
int64 = "long"
float32 = "float"
float64 = "double"
string = "string"
bytes = "byte[]"
uuid = "string"
decimal = "double"
date = "string"
time = "string"
time_tz = "string"
datetime = "DateTime"
datetime_tz = "string"
interval = "string"
json = "string"
inet = "string"

[types.containers]
array = "List<{T}>"
nullable = "{T}?"
range = "string"
json_typed = "{T}"

[naming]
struct_case = "PascalCase"
field_case = "PascalCase"
fn_case = "PascalCase"
enum_variant_case = "PascalCase"
row_suffix = "Row"

[imports.rules]
