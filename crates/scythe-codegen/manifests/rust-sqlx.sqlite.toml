[backend]
name = "rust-sqlx"
language = "rust"
file_extension = "rs"
engine = "sqlite"
description = "Rust code generation targeting sqlx with SQLite"

[types.scalars]
bool = "bool"
int16 = "i16"
int32 = "i32"
int64 = "i64"
float32 = "f32"
float64 = "f64"
string = "String"
bytes = "Vec<u8>"
uuid = "String"
decimal = "String"
date = "String"
time = "String"
time_tz = "String"
datetime = "String"
datetime_tz = "String"
interval = "String"
json = "String"
inet = "String"

[types.containers]
array = "Vec<{T}>"
nullable = "Option<{T}>"
json_typed = "{T}"

[naming]
struct_case = "PascalCase"
field_case = "snake_case"
fn_case = "snake_case"
enum_variant_case = "PascalCase"
row_suffix = "Row"

[imports.rules]
