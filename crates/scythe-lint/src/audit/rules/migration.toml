schema_version = 1

# DROP TABLE is irreversible and breaks any deployed application version
[[rule]]
id = "SC-MIG01"
name = "ban-drop-table"
category = "migration"
severity = "error"
dialects = ["postgres"]
cwe = []
description = "DROP TABLE is irreversible and breaks any deployed application version still reading from the table"
message = "DROP TABLE `{table}` is irreversible — stage as rename → backfill → drop in separate releases"
matcher = "drop_statement"

[rule.matcher_args]
kinds = ["table"]

[[rule]]
id = "SC-MIG02"
name = "ban-drop-column"
category = "migration"
severity = "error"
dialects = ["postgres"]
cwe = []
description = "ALTER TABLE … DROP COLUMN breaks any deployed application version still reading from the column"
message = "ALTER TABLE `{table}` DROP COLUMN `{column}` — stop reading from `{column}` in the application first; drop in a later release"
matcher = "drop_statement"

[rule.matcher_args]
kinds = ["column"]

[[rule]]
id = "SC-MIG03"
name = "require-concurrent-index-creation"
category = "migration"
severity = "error"
dialects = ["postgres"]
cwe = []
description = "CREATE INDEX without CONCURRENTLY takes ACCESS EXCLUSIVE on the table — blocks reads and writes for the duration of the build"
message = "CREATE INDEX `{index}` on `{table}` is not CONCURRENT — use CREATE INDEX CONCURRENTLY to avoid table lock"
matcher = "create_index_concurrency"

[[rule]]
id = "SC-MIG04"
name = "renaming-column"
category = "migration"
severity = "error"
dialects = ["postgres"]
cwe = []
description = "ALTER TABLE … RENAME COLUMN breaks any deployed application version still reading from the old name"
message = "rename of `{table}.{old_column}` to `{new_column}` — stage as add-new → backfill → drop-old across releases"
matcher = "alter_table_rename_column"

[[rule]]
id = "SC-MIG05"
name = "constraint-missing-not-valid"
category = "migration"
severity = "error"
dialects = ["postgres"]
cwe = []
description = "ALTER TABLE … ADD CONSTRAINT without NOT VALID validates every existing row under ACCESS EXCLUSIVE — write-blocking on large tables"
message = "ADD {constraint_kind} on `{table}` is missing NOT VALID — split into `ADD CONSTRAINT … NOT VALID;` plus a follow-up `VALIDATE CONSTRAINT` to avoid long write locks"
matcher = "constraint_missing_not_valid"

[[rule]]
id = "SC-MIG06"
name = "ban-drop-database-or-schema"
category = "migration"
severity = "error"
dialects = ["postgres"]
cwe = []
description = "DROP DATABASE / DROP SCHEMA destroys every contained object — unrecoverable without backup"
message = "DROP {kind} `{name}` is irreversible — confirm intent and back up first; consider RENAME for staged removal"
matcher = "drop_statement"

[rule.matcher_args]
kinds = ["database", "schema"]

[[rule]]
id = "SC-MIG07"
name = "renaming-table"
category = "migration"
severity = "error"
dialects = ["postgres"]
cwe = []
description = "ALTER TABLE … RENAME TO breaks any deployed application version still reading from the old name"
message = "rename of table `{old_table}` to `{new_table}` — stage as create-new → backfill → switch reads → drop-old across releases"
matcher = "alter_table_rename_table"

[[rule]]
id = "SC-MIG08"
name = "ban-truncate-cascade"
category = "migration"
severity = "error"
dialects = ["postgres"]
cwe = []
description = "TRUNCATE … CASCADE clears every referencing table — blast radius is invisible from the statement alone"
message = "TRUNCATE `{table}` CASCADE silently clears every referencing table — list the tables explicitly instead"
matcher = "truncate_cascade"

[[rule]]
id = "SC-MIG09"
name = "ban-alter-column-type"
category = "migration"
severity = "error"
dialects = ["postgres"]
cwe = []
description = "ALTER COLUMN … TYPE rewrites the table under ACCESS EXCLUSIVE — blocks reads and writes for the duration"
message = "ALTER `{table}.{column}` TYPE {target_type} rewrites the table under ACCESS EXCLUSIVE — stage as add-new-column → backfill → swap → drop-old"
matcher = "alter_column_type"

[[rule]]
id = "SC-MIG10"
name = "prefer-bigint-over-int"
category = "migration"
severity = "error"
dialects = ["postgres"]
cwe = []
description = "Column declared as int/integer/int4/smallint/int2 — 32-bit keys overflow at 2^31 and widening later requires a write-blocking ALTER"
message = "`{table}.{column}` uses `{actual_type}` — prefer `{suggested_type}` to avoid 32-bit overflow and a future write-blocking type change"
matcher = "column_type_disallowed"

[rule.matcher_args]
disallowed = ["int", "integer", "int4", "smallint", "int2"]
suggested = "bigint"

[[rule]]
id = "SC-MIG11"
name = "prefer-text-over-varchar"
category = "migration"
severity = "error"
dialects = ["postgres"]
cwe = []
description = "Column declared as varchar(n)/character varying(n)/char(n) — Postgres stores these identically to text; a length increase is write-blocking"
message = "`{table}.{column}` uses `{actual_type}` — prefer `{suggested_type}` with a CHECK constraint; a length increase on varchar is a write-blocking ALTER"
matcher = "column_type_disallowed"

[rule.matcher_args]
disallowed = ["varchar", "character varying", "char"]
suggested = "text"

[[rule]]
id = "SC-MIG12"
name = "prefer-timestamptz"
category = "migration"
severity = "error"
dialects = ["postgres"]
cwe = []
description = "Column declared as timestamp/timestamp without time zone — naive timestamps silently shift on session timezone changes"
message = "`{table}.{column}` uses `{actual_type}` — prefer `{suggested_type}` to avoid silent timezone-dependent shifts"
matcher = "column_type_disallowed"

[rule.matcher_args]
disallowed = ["timestamp", "timestamp without time zone"]
suggested = "timestamptz"

[[rule]]
id = "SC-MIG13"
name = "prefer-identity-over-serial"
category = "migration"
severity = "error"
dialects = ["postgres"]
cwe = []
description = "Column declared as serial/bigserial/smallserial — SERIAL is legacy shorthand; use GENERATED AS IDENTITY for explicit SQL-standard sequence ownership"
message = "`{table}.{column}` uses `{actual_type}` — prefer `{suggested_type}` (`GENERATED ALWAYS AS IDENTITY`) for explicit SQL-standard sequence ownership"
matcher = "column_type_disallowed"

[rule.matcher_args]
disallowed = ["serial", "bigserial", "smallserial"]
suggested = "identity"

[[rule]]
id = "SC-MIG14"
name = "disallowed-unique-constraint"
category = "migration"
severity = "error"
dialects = ["postgres"]
cwe = []
description = "ALTER TABLE … ADD CONSTRAINT … UNIQUE (…) builds the index inline under ACCESS EXCLUSIVE — blocks reads and writes for the duration of the build"
message = "ADD UNIQUE on `{table}` builds the index inline under ACCESS EXCLUSIVE — `CREATE UNIQUE INDEX CONCURRENTLY` first, then `ALTER TABLE … ADD CONSTRAINT … UNIQUE USING INDEX …`"
matcher = "add_constraint_without_using_index"

[rule.matcher_args]
kinds = ["unique"]

[[rule]]
id = "SC-MIG15"
name = "adding-primary-key-constraint"
category = "migration"
severity = "error"
dialects = ["postgres"]
cwe = []
description = "ALTER TABLE … ADD CONSTRAINT … PRIMARY KEY (…) builds the index inline under ACCESS EXCLUSIVE — blocks reads and writes for the duration of the build"
message = "ADD PRIMARY KEY on `{table}` builds the index inline under ACCESS EXCLUSIVE — `CREATE UNIQUE INDEX CONCURRENTLY` first, then `ALTER TABLE … ADD CONSTRAINT … PRIMARY KEY USING INDEX …`"
matcher = "add_constraint_without_using_index"

[rule.matcher_args]
kinds = ["primary_key"]

[[rule]]
id = "SC-MIG16"
name = "ban-create-domain-with-constraint"
category = "migration"
severity = "error"
dialects = ["postgres"]
cwe = []
description = "CREATE DOMAIN with a CHECK constraint validates every row of every table using the domain under ACCESS EXCLUSIVE and cannot be split into NOT VALID + VALIDATE"
message = "CREATE DOMAIN `{domain}` with a CHECK constraint cannot be added incrementally — declare the domain without a constraint and enforce CHECK on each column with `NOT VALID` + `VALIDATE CONSTRAINT`"
matcher = "create_domain_with_constraint"

[[rule]]
id = "SC-MIG17"
name = "ban-drop-not-null"
category = "migration"
severity = "error"
dialects = ["postgres"]
cwe = []
description = "ALTER TABLE … ALTER COLUMN … DROP NOT NULL relaxes a column contract that deployed application versions may still rely on"
message = "DROP NOT NULL on `{table}.{column}` weakens an existing contract — deploy code that tolerates NULL first; drop the constraint in a later release"
matcher = "alter_column_drop_not_null"

[[rule]]
id = "SC-MIG18"
name = "adding-not-nullable-field"
category = "migration"
severity = "warn"
dialects = ["postgres"]
cwe = []
description = "ALTER TABLE … ADD COLUMN … NOT NULL without a DEFAULT rewrites every existing row on PG < 11 and breaks deployed application versions that insert without the new column"
message = "ADD COLUMN `{table}.{column}` is NOT NULL without a DEFAULT — provide a constant DEFAULT (catalog-only on PG 11+) and backfill before deploying code that requires the new column"
matcher = "add_column_not_null_no_default"

[[rule]]
id = "SC-MIG19"
name = "unsupported-reg-types"
category = "migration"
severity = "error"
dialects = ["postgres"]
cwe = []
description = "column declared as a reg* OID type other than regclass — blocks pg_upgrade and does not survive logical dump/restore"
message = "`{table}.{column}` is `{actual_type}` — reg* OID types (other than regclass) block pg_upgrade; store the underlying name as text and resolve at query time"
matcher = "column_type_disallowed"

[rule.matcher_args]
disallowed = [
    "regcollation",
    "regconfig",
    "regdictionary",
    "regnamespace",
    "regoper",
    "regoperator",
    "regproc",
    "regprocedure",
]
suggested = ""
