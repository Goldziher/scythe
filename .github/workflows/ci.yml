name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Generate integration tests from fixtures
        run: |
          cargo run -p test-generator -- --fixtures testing_data --output crates/scythe-cli/tests/generated
          cargo fmt --all
      - name: Check formatting
        run: cargo fmt --check
      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Generate integration tests from fixtures
        run: cargo run -p test-generator -- --fixtures testing_data --output crates/scythe-cli/tests/generated
      - name: Run tests
        run: cargo test --workspace

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Generate integration tests from fixtures
        run: cargo run -p test-generator -- --fixtures testing_data --output crates/scythe-cli/tests/generated
      - name: Build
        run: cargo build --workspace --release
      - name: Validate documentation snippets
        run: ./target/release/snippet-runner validate -s docs/snippets -r docs/docs -L syntax
