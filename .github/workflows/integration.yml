name: Integration Tests

on:
  push:
    branches: [main]
    paths:
      - "crates/scythe-codegen/**"
      - "crates/scythe-core/**"
      - "backends/**"
      - "integration_tests/**"
  pull_request:
    branches: [main]
    paths:
      - "crates/scythe-codegen/**"
      - "crates/scythe-core/**"
      - "backends/**"
      - "integration_tests/**"
  workflow_dispatch:

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  integration-pg:
    name: PostgreSQL Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: scythe
          POSTGRES_PASSWORD: scythe
          POSTGRES_DB: scythe_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://scythe:scythe@localhost:5432/scythe_test

    steps:
      - uses: actions/checkout@v6

      - name: Run PG schema migration
        run: PGPASSWORD=scythe psql -h localhost -U scythe -d scythe_test -f integration_tests/sql/pg/schema.sql

      # Language toolchains
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            integration_tests/rust-sqlx -> target
            integration_tests/rust-tokio-postgres -> target
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "26"
          elixir-version: "1.16"
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_pgsql

      - run: pip install uv
      - run: npm install -g pnpm

      # Rust
      - name: Test rust-sqlx
        working-directory: integration_tests/rust-sqlx
        run: cargo run --quiet

      - name: Test rust-tokio-postgres
        working-directory: integration_tests/rust-tokio-postgres
        run: cargo run --quiet

      # Python
      - name: Test python-psycopg3
        working-directory: integration_tests/python-psycopg3
        run: uv run python test_integration.py

      - name: Test python-asyncpg
        working-directory: integration_tests/python-asyncpg
        run: uv run python test_integration.py

      - name: Test python-psycopg3-pydantic
        working-directory: integration_tests/python-psycopg3-pydantic
        run: uv run python test_integration.py

      - name: Test python-psycopg3-msgspec
        working-directory: integration_tests/python-psycopg3-msgspec
        run: uv run python test_integration.py

      # Go
      - name: Test go-pgx
        working-directory: integration_tests/go-pgx
        run: go run .

      # TypeScript
      - name: Test typescript-postgres
        working-directory: integration_tests/typescript-postgres
        run: |
          pnpm install
          pnpm exec tsx test.ts

      - name: Test typescript-pg
        working-directory: integration_tests/typescript-pg
        run: |
          pnpm install
          pnpm exec tsx test.ts

      - name: Test typescript-pg-zod
        working-directory: integration_tests/typescript-pg-zod
        run: |
          pnpm install
          pnpm exec tsx test.ts

      # JVM
      - name: Test java-jdbc
        working-directory: integration_tests/java-jdbc
        run: mvn -q compile exec:java

      - name: Test kotlin-jdbc
        working-directory: integration_tests/kotlin-jdbc
        run: gradle run --quiet

      # .NET
      - name: Test csharp-npgsql
        working-directory: integration_tests/csharp-npgsql
        run: dotnet run

      # Elixir
      - name: Test elixir-postgrex
        working-directory: integration_tests/elixir-postgrex
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get
          mix run test/integration_test.exs

      - name: Test elixir-ecto
        working-directory: integration_tests/elixir-ecto
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get
          mix run test/integration_test.exs

      # Ruby
      - name: Test ruby-pg
        working-directory: integration_tests/ruby-pg
        run: |
          bundle install
          bundle exec ruby test_integration.rb

      # PHP
      - name: Test php-pdo
        working-directory: integration_tests/php-pdo
        run: php test_integration.php

      - name: Test php-amphp
        working-directory: integration_tests/php-amphp
        run: |
          composer install --quiet
          php test_integration.php

  integration-mysql:
    name: MySQL Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: scythe
          MYSQL_DATABASE: scythe_test
          MYSQL_USER: scythe
          MYSQL_PASSWORD: scythe
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: mysql://scythe:scythe@127.0.0.1:3306/scythe_test
      MYSQL_URL: mysql://scythe:scythe@127.0.0.1:3306/scythe_test

    steps:
      - uses: actions/checkout@v6

      - name: Run MySQL schema migration
        run: mysql -h 127.0.0.1 -u scythe -pscythe scythe_test < integration_tests/sql/mysql/schema.sql

      # Language toolchains
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            integration_tests/rust-sqlx-mysql -> target
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "26"
          elixir-version: "1.16"
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_mysql

      - run: pip install uv
      - run: npm install -g pnpm

      - name: Test rust-sqlx-mysql
        working-directory: integration_tests/rust-sqlx-mysql
        run: cargo run --quiet

      - name: Test go-database-sql-mysql
        working-directory: integration_tests/go-database-sql-mysql
        run: go run .

      - name: Test python-aiomysql
        working-directory: integration_tests/python-aiomysql
        run: uv run python test_integration.py

      - name: Test typescript-mysql2
        working-directory: integration_tests/typescript-mysql2
        run: |
          pnpm install
          pnpm exec tsx test.ts

      - name: Test java-jdbc-mysql
        working-directory: integration_tests/java-jdbc-mysql
        run: mvn -q compile exec:java

      - name: Test kotlin-jdbc-mysql
        working-directory: integration_tests/kotlin-jdbc-mysql
        run: gradle run --quiet

      - name: Test csharp-mysqlconnector
        working-directory: integration_tests/csharp-mysqlconnector
        run: dotnet run

      - name: Test elixir-myxql
        working-directory: integration_tests/elixir-myxql
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get
          mix run test/integration_test.exs

      - name: Test ruby-mysql2
        working-directory: integration_tests/ruby-mysql2
        run: |
          bundle install
          bundle exec ruby test_integration.rb

      - name: Test ruby-trilogy
        working-directory: integration_tests/ruby-trilogy
        run: |
          bundle install
          bundle exec ruby test_integration.rb

      - name: Test php-pdo-mysql
        working-directory: integration_tests/php-pdo-mysql
        run: php test_integration.php

  integration-mariadb:
    name: MariaDB Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: scythe
          MARIADB_DATABASE: scythe_test
          MARIADB_USER: scythe
          MARIADB_PASSWORD: scythe
        ports:
          - 3306:3306
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      MARIADB_URL: mysql://scythe:scythe@127.0.0.1:3306/scythe_test

    steps:
      - uses: actions/checkout@v6

      - name: Run MariaDB schema migration
        run: mysql -h 127.0.0.1 -u scythe -pscythe scythe_test < integration_tests/sql/mariadb/schema.sql

      # Language toolchains
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            integration_tests/rust-sqlx-mariadb -> target
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "26"
          elixir-version: "1.16"
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_mysql

      - run: pip install uv
      - run: npm install -g pnpm

      - name: Test rust-sqlx-mariadb
        working-directory: integration_tests/rust-sqlx-mariadb
        env:
          DATABASE_URL: ${{ env.MARIADB_URL }}
        run: cargo run --quiet

      - name: Test go-database-sql-mariadb
        working-directory: integration_tests/go-database-sql-mariadb
        run: go run .

      - name: Test python-aiomysql-mariadb
        working-directory: integration_tests/python-aiomysql-mariadb
        run: uv run python test_integration.py

      - name: Test typescript-mysql2-mariadb
        working-directory: integration_tests/typescript-mysql2-mariadb
        run: |
          pnpm install
          pnpm exec tsx test.ts

      - name: Test java-jdbc-mariadb
        working-directory: integration_tests/java-jdbc-mariadb
        run: mvn -q compile exec:java

      - name: Test kotlin-jdbc-mariadb
        working-directory: integration_tests/kotlin-jdbc-mariadb
        run: gradle run --quiet

      - name: Test csharp-mysqlconnector-mariadb
        working-directory: integration_tests/csharp-mysqlconnector-mariadb
        run: dotnet run

      - name: Test elixir-myxql-mariadb
        working-directory: integration_tests/elixir-myxql-mariadb
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get
          mix run test/integration_test.exs

      - name: Test ruby-mysql2-mariadb
        working-directory: integration_tests/ruby-mysql2-mariadb
        run: |
          bundle install
          bundle exec ruby test_integration.rb

      - name: Test ruby-trilogy-mariadb
        working-directory: integration_tests/ruby-trilogy-mariadb
        run: |
          bundle install
          bundle exec ruby test_integration.rb

      - name: Test php-pdo-mariadb
        working-directory: integration_tests/php-pdo-mariadb
        run: php test_integration.php

  integration-oracle:
    name: Oracle Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      oracle:
        image: gvenzl/oracle-xe:21-slim
        env:
          ORACLE_PASSWORD: scythe
          APP_USER: scythe
          APP_USER_PASSWORD: scythe
        ports:
          - 1521:1521
        options: >-
          --health-cmd "healthcheck.sh"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20

    env:
      ORACLE_URL: oracle://scythe:scythe@localhost:1521/XEPDB1

    steps:
      - uses: actions/checkout@v6

      - name: Run Oracle schema migration
        run: |
          sudo apt-get update && sudo apt-get install -y libaio1 alien
          wget -q https://download.oracle.com/otn_software/linux/instantclient/2340000/oracle-instantclient-basic-23.4.0.24.05-1.el9.x86_64.rpm
          wget -q https://download.oracle.com/otn_software/linux/instantclient/2340000/oracle-instantclient-sqlplus-23.4.0.24.05-1.el9.x86_64.rpm
          sudo alien -i oracle-instantclient-basic-*.rpm
          sudo alien -i oracle-instantclient-sqlplus-*.rpm
          echo "/usr/lib/oracle/23/client64/lib" | sudo tee /etc/ld.so.conf.d/oracle.conf
          sudo ldconfig
          export LD_LIBRARY_PATH="/usr/lib/oracle/23/client64/lib:${LD_LIBRARY_PATH:-}"
          export PATH=/usr/lib/oracle/23/client64/bin:$PATH
          sqlplus scythe/scythe@localhost:1521/XEPDB1 @integration_tests/sql/oracle/schema_full.sql

      # Language toolchains
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "26"
          elixir-version: "1.16"
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - run: pip install uv
      - run: npm install -g pnpm

      - name: Set Oracle library paths
        run: |
          echo "LD_LIBRARY_PATH=/usr/lib/oracle/23/client64/lib:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          echo "/usr/lib/oracle/23/client64/bin" >> "$GITHUB_PATH"

      - name: Test python-oracledb-oracle
        working-directory: integration_tests/python-oracledb-oracle
        run: uv run python test_integration.py

      - name: Test typescript-oracledb-oracle
        working-directory: integration_tests/typescript-oracledb-oracle
        run: |
          pnpm install
          pnpm exec tsx test.ts

      - name: Test go-godror-oracle
        working-directory: integration_tests/go-godror-oracle
        run: go run .

      - name: Test java-jdbc-oracle
        working-directory: integration_tests/java-jdbc-oracle
        run: mvn -q compile exec:java

      - name: Test kotlin-jdbc-oracle
        working-directory: integration_tests/kotlin-jdbc-oracle
        run: gradle run --quiet

      - name: Test csharp-oracle
        working-directory: integration_tests/csharp-oracle
        run: dotnet run

      - name: Test elixir-jamdb-oracle
        working-directory: integration_tests/elixir-jamdb-oracle
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get
          mix run test/integration_test.exs

      - name: Test ruby-oci8-oracle
        working-directory: integration_tests/ruby-oci8-oracle
        run: |
          bundle install
          bundle exec ruby test_integration.rb

      - name: Test rust-sibyl-oracle
        working-directory: integration_tests/rust-sibyl-oracle
        run: cargo run --quiet

  integration-sqlite:
    name: SQLite Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DATABASE_URL: "sqlite:///tmp/scythe_test.db"
      SQLITE_PATH: "/tmp/scythe_test.db"
      DATABASE_PATH: "/tmp/scythe_test.db"

    steps:
      - uses: actions/checkout@v6

      # Language toolchains
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            integration_tests/rust-sqlx-sqlite -> target
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "26"
          elixir-version: "1.16"
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_sqlite

      - run: pip install uv
      - run: npm install -g pnpm

      - name: Test rust-sqlx-sqlite
        working-directory: integration_tests/rust-sqlx-sqlite
        run: cargo run --quiet

      - name: Test go-database-sql-sqlite
        working-directory: integration_tests/go-database-sql-sqlite
        run: go run .

      - name: Test python-aiosqlite
        working-directory: integration_tests/python-aiosqlite
        run: uv run python test_integration.py

      - name: Test typescript-better-sqlite3
        working-directory: integration_tests/typescript-better-sqlite3
        run: |
          pnpm install
          pnpm exec tsx test.ts

      - name: Test java-jdbc-sqlite
        working-directory: integration_tests/java-jdbc-sqlite
        run: mvn -q compile exec:java

      - name: Test kotlin-jdbc-sqlite
        working-directory: integration_tests/kotlin-jdbc-sqlite
        run: gradle run --quiet

      - name: Test csharp-microsoft-sqlite
        working-directory: integration_tests/csharp-microsoft-sqlite
        run: dotnet run

      - name: Test elixir-exqlite
        working-directory: integration_tests/elixir-exqlite
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get
          mix run test/integration_test.exs

      - name: Test ruby-sqlite3
        working-directory: integration_tests/ruby-sqlite3
        run: |
          bundle install
          bundle exec ruby test_integration.rb

      - name: Test php-pdo-sqlite
        working-directory: integration_tests/php-pdo-sqlite
        run: php test_integration.php
