# AI-Rulez Configuration (migrated to V4 TOML format)
# Documentation: https://github.com/Goldziher/ai-rulez

version = '4.0'
name = 'scythe'
description = 'SQL compilation and code generation framework — compiles annotated SQL into type-safe database access code for 10 languages'
gitignore = true
presets = ['claude', 'gemini', 'codex']
builtins = ['rust', 'python', 'typescript', 'ruby', 'php', 'elixir', 'go', 'java', 'csharp', 'pyo3', 'napi-rs', 'security', 'git-workflow', 'code-quality', 'testing', 'token-efficiency', 'default-commands']

[header]
style = 'minimal'

[[includes]]
name = 'kreuzberg-core'
source = 'https://github.com/kreuzberg-dev/ai-rulez.git'
path = 'modules/core'
merge_strategy = 'local-override'

[[includes]]
name = 'kreuzberg-cicd'
source = 'https://github.com/kreuzberg-dev/ai-rulez.git'
path = 'modules/cicd'
merge_strategy = 'local-override'

[[includes]]
name = 'kreuzberg-e2e-generator'
source = 'https://github.com/kreuzberg-dev/ai-rulez.git'
path = 'modules/e2e-generator'
merge_strategy = 'local-override'
