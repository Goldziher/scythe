$schema: https://raw.githubusercontent.com/Goldziher/ai-rulez/main/schema/ai-rules-v3.schema.json
description: Rust-centric multi-language HTTP framework providing core library, CLI, and tower-http runtime with polyglot bindings (Python/TypeScript/Ruby/PHP/Elixir). Type-safe web service toolkit with fixture-driven testing across all platforms.
gitignore: true
name: scythe

builtins:
  - rust
  - python
  - typescript
  - ruby
  - php
  - elixir
  - security
  - git-workflow
  - code-quality
  - testing
  - token-efficiency
  - default-commands

presets:
  - claude
compression:
  level: moderate
version: "3.0"
