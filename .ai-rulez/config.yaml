$schema: https://raw.githubusercontent.com/Goldziher/ai-rulez/main/schema/ai-rules-v3.schema.json
description: SQL compilation and code generation framework — compiles annotated SQL into type-safe database access code for 10 languages
gitignore: true
name: scythe

header:
  style: minimal

includes:
  - name: kreuzberg-core
    source: https://github.com/kreuzberg-dev/ai-rulez.git
    path: modules/core
    local_override: ../kreuzberg-dev/ai-rulez
    merge_strategy: local-override
  - name: kreuzberg-cicd
    source: https://github.com/kreuzberg-dev/ai-rulez.git
    path: modules/cicd
    local_override: ../kreuzberg-dev/ai-rulez
    merge_strategy: local-override
  - name: kreuzberg-e2e-generator
    source: https://github.com/kreuzberg-dev/ai-rulez.git
    path: modules/e2e-generator
    local_override: ../kreuzberg-dev/ai-rulez
    merge_strategy: local-override

builtins:
  - rust
  - python
  - typescript
  - ruby
  - php
  - elixir
  - go
  - java
  - csharp
  - pyo3
  - napi-rs
  - security
  - git-workflow
  - code-quality
  - testing
  - token-efficiency
  - default-commands

presets:
  - claude
  - gemini
  - codex
compression:
  level: moderate
version: "3.0"
