# Generated by scripts/migrate_to_poly.py from .pre-commit-config.yaml + tool configs. Review before committing.

[defaults]
line_length = 120
line_ending = "lf"
final_newline = true
trim_trailing_whitespace = true

[discovery]
exclude = [
    "**/*.lock",
    "**/*.svg",
    # scythe's SQL codegen test corpus — inputs its generator consumes and
    # snapshots; must stay byte-stable, so poly does not lint/format them.
    "tests/schemas/**",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
    ".basemind/**",
    "artifacts/**",
    "dist/**",
    "docs/snippets/**",
    "integration_tests/**",
    "node_modules/**",
    "target/**",
    "vendor/**",
]

[lint.python.ruff]
target_version = "py312"
line_length = 120

[lint.markdown.rumdl]
disable = ["MD012", "MD013", "MD024", "MD030", "MD033", "MD035", "MD036", "MD041", "MD046", "MD051", "MD076"]

[fmt.markdown.rumdl]
disable = ["MD012", "MD013", "MD024", "MD030", "MD033", "MD035", "MD036", "MD041", "MD046", "MD051", "MD076"]

[lint.typos]
extend_words = { CHECKs = "CHECKs", SELCT = "SELCT", SELECTs = "SELECTs", ba = "ba", inh = "inh", statu = "statu" }
extend_exclude = [
    "go.sum",
    "**/go.sum",
    "**/go.mod",
    "Cargo.lock",
    "**/Cargo.lock",
    "pnpm-lock.yaml",
    "**/pnpm-lock.yaml",
    "package-lock.json",
    "**/package-lock.json",
]
# NOTE: typos extend-ignore-re is NOT portable to poly (no regex-based ignore support).

[hooks]
stages = ["pre-commit"]

[hooks.builtin]
polylint = { exclude = [
    "**/*.lock",
    "**/*.svg",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
    ".basemind/**",
    "artifacts/**",
    "dist/**",
    "docs/snippets/**",
    "integration_tests/**",
    "node_modules/**",
    "target/**",
    "vendor/**",
] }
polyfmt = { exclude = [
    "**/*.lock",
    "**/*.svg",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
    ".basemind/**",
    "artifacts/**",
    "dist/**",
    "docs/snippets/**",
    "integration_tests/**",
    "node_modules/**",
    "target/**",
    "vendor/**",
] }
commit = { stages = ["commit-msg"] }
file_safety = { exclude = [
    "**/*.lock",
    "**/*.svg",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
    ".basemind/**",
    "artifacts/**",
    "dist/**",
    "docs/snippets/**",
    "integration_tests/**",
    "node_modules/**",
    "target/**",
    "vendor/**",
] }
cargo = true

# --- catalog tools (standalone binaries, PATH-probed) ---
[tools.shfmt]
enabled = true

[tools.shellcheck]
enabled = true

[tools.actionlint]
enabled = true

# --- lightweight inline script hooks (no toolchain) ---
