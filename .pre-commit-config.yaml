default_install_hook_types:
  - pre-commit
  - commit-msg
exclude: vendor/|node_modules/|target/|dist/|artifacts/

repos:
  # Commit message linting
  - repo: https://github.com/Goldziher/gitfluff
    rev: v0.8.0
    hooks:
      - id: gitfluff-lint
        args: ["--write"]
        stages: [commit-msg]

  - repo: https://github.com/Goldziher/ai-rulez
    rev: v3.11.5
    hooks:
      - id: ai-rulez-validate
      - id: ai-rulez-generate

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: detect-private-key
      - id: check-json
      - id: check-yaml
        args: ["--allow-multiple-documents", "--unsafe"]
      - id: check-toml
      - id: check-case-conflict

  # TOML formatting
  - repo: https://github.com/ComPWA/taplo-pre-commit
    rev: v0.9.3
    hooks:
      - id: taplo-format
        exclude: "pyproject.toml|Cargo.toml"

  # Markdown: linting
  - repo: https://github.com/rvben/rumdl-pre-commit
    rev: "v0.1.71"
    hooks:
      - id: rumdl-fmt
        exclude: "docs/snippets/"

  # Rust: formatting, linting, and license checking
  - repo: https://github.com/DevinR528/cargo-sort
    rev: "v2.1.3"
    hooks:
      - id: cargo-sort
        args: [-w]

  - repo: https://github.com/AndrejOrsula/pre-commit-cargo
    rev: 0.5.0
    hooks:
      - id: cargo-fmt
        args: ["--all"]
      - id: cargo-clippy
        args:
          [
            "--fix",
            "--allow-dirty",
            "--allow-staged",
            "--workspace",
            "--all-features",
            "--all-targets",
            "--",
            "-D",
            "warnings",
          ]

  - repo: https://github.com/bnjbvr/cargo-machete
    rev: v0.9.1
    hooks:
      - id: cargo-machete

  - repo: https://github.com/EmbarkStudios/cargo-deny
    rev: 0.19.2
    hooks:
      - id: cargo-deny
        args: ["check"]

  # Shell scripts: formatting and linting
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        args: ["-w", "-i", "2"]

  # JavaScript/TypeScript/JSON/CSS: biome (formatting + linting with autofixes)
  - repo: https://github.com/biomejs/pre-commit
    rev: v2.4.11
    hooks:
      - id: biome-format

  # GitHub Actions: linting
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # Local hooks
  - repo: local
    hooks:
      - id: shellcheck
        name: Shell linting (shellcheck)
        entry: shellcheck
        language: system
        types: [shell]
        stages: [commit]
