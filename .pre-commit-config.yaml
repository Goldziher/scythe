default_install_hook_types:
  - pre-commit
  - commit-msg
default_stages:
  - pre-commit
exclude: vendor/|node_modules/|target/|dist/|artifacts/|\.basemind/

repos:
  - repo: https://github.com/Goldziher/gitfluff
    rev: v0.8.0
    hooks:
      - id: gitfluff-lint
        args:
          - --write
        stages:
          - commit-msg

  - repo: https://github.com/xberg-io/pre-commit-hooks
    rev: v3.0.0
    hooks:
      # File safety
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: detect-private-key
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: mixed-line-ending
      - id: typos
        args:
          - --force-exclude
      - id: check-json
      - id: check-yaml
        args:
          - --allow-multiple-documents
          - --unsafe
      - id: check-toml

      # AI rulez governance config
      - id: ai-rulez-validate
      - id: ai-rulez-generate

      # Shell
      - id: shfmt
        args:
          - -w
          - -i
          - "2"
      - id: shellcheck

      # Markdown
      - id: rumdl-fmt
        exclude: ^docs/snippets/
      # TODO(docs): scythe's prose docs predate the 120-char strict rule;
      # 35 files trip MD013 today. Re-enable after a docs-wide line-wrap pass.
      # - id: markdownlint-rumdl-strict
      #   exclude: ^docs/snippets/

      # Rust
      - id: cargo-fmt
        args:
          - --all
      - id: cargo-clippy
        args:
          - --fix
          - --allow-dirty
          - --allow-staged
          - --workspace
          - --all-features
          - --all-targets
          - --
          - -D
          - warnings
      - id: cargo-sort
      - id: cargo-machete
      - id: cargo-deny
        args:
          - check
      # TODO(docs): rustdoc-lint enforces #![deny(missing_docs)] crate-wide; ~449
      # public items in scythe-core/codegen/lint currently lack rustdoc. Re-enable
      # after a documentation pass — track as a follow-up issue.
      # - id: rustdoc-lint
      # TODO(refactor): rust-max-lines caps files at 1,000 LOC. Four files
      # exceed the cap today (catalog/mod.rs 1456, parser/mod.rs 1180, analyzer/
      # expressions.rs 1101, integration-test-generator/main.rs 1130). Re-enable
      # after splitting; the cap protects against single-file sprawl on new code.
      # - id: rust-max-lines
      #   args:
      #     - --max=1000

      # GitHub Actions
      - id: actionlint
      - id: gh-actions-updater

  # TOML formatting (taplo is not bundled in the consolidated hook repo)
  - repo: https://github.com/ComPWA/taplo-pre-commit
    rev: v0.9.3
    hooks:
      - id: taplo-format
        exclude: pyproject.toml|Cargo.toml

  # JS/TS/JSON formatting (biome covers JSON too; kept as a single source of
  # truth so scythe-cli's TypeScript bindings and JSON fixtures stay aligned)
  - repo: https://github.com/biomejs/pre-commit
    rev: v2.5.0
    hooks:
      - id: biome-format
